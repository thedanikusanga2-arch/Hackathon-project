<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ingredients Scanner | Happy Cravings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #FFF0F0;
        }
        .glass {
            background: rgba(226, 132, 198, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .img-hover-zoom { transition: transform 0.5s ease; }
        .group:hover .img-hover-zoom { transform: scale(1.08); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #FFF0F0; }
        ::-webkit-scrollbar-thumb { background: #E284C6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9E4759; }
        
        canvas, #uploaded-image {
            border-radius: 0.75rem;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            object-fit: cover;
        }
    </style>
</head>
<body class="text-slate-800 antialiased flex flex-col min-h-screen">

    <nav class="w-full glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center text-slate-900 hover:text-slate-700 font-bold transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Menu
            </a>
            <div class="text-xl font-bold text-slate-900 tracking-tight">
                HappyCravings
            </div>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center p-6">
        <div class="glass max-w-lg w-full rounded-2xl p-8 text-center shadow-xl">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Identify Your Food</h1>
            <p class="text-slate-600 mb-6" id="status-text">Loading AI Model...</p>
            
            <div class="flex justify-center gap-4 mb-8" id="controls" style="display: none;">
                <button onclick="switchMode('camera')" id="btn-camera" class="px-6 py-2 rounded-full border-2 border-slate-900 text-slate-900 font-bold hover:bg-slate-100 transition-colors bg-transparent">
                    Use Camera
                </button>
                <button onclick="switchMode('upload')" id="btn-upload" class="px-6 py-2 rounded-full border-2 border-slate-900 text-slate-900 font-bold hover:bg-slate-100 transition-colors bg-transparent">
                    Upload Photo
                </button>
            </div>

            <div id="camera-section" class="hidden flex-col items-center w-full">
                <div id="webcam-container" class="mb-6 w-full flex justify-center"></div>
                <button onclick="captureAndPredict()" class="w-full bg-[#9E4759] text-white font-bold py-3 rounded-xl hover:bg-[#803875] transition-colors shadow-lg">
                    📸 Capture & Identify
                </button>
            </div>

            <div id="upload-section" class="hidden flex-col items-center w-full">
                <label class="w-full flex flex-col items-center px-4 py-6 bg-white text-[#9E4759] rounded-xl shadow-lg tracking-wide border-2 border-[#E284C6] cursor-pointer hover:bg-[#FFF0F0] transition-colors mb-6">
                    <svg class="w-8 h-8" fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                        <path d="M16.88 9.1A4 4 0 0 1 16 17H5a5 5 0 0 1-1-9.9V7a3 3 0 0 1 4.52-2.59A4.98 4.98 0 0 1 17 8c0 .38-.04.74-.12 1.1zM11 11h3l-4-4-4 4h3v3h2v-3z" />
                    </svg>
                    <span class="mt-2 text-base leading-normal font-bold">Select an image</span>
                    <input type='file' class="hidden" id="image-upload" accept="image/*" />
                </label>
                <img id="uploaded-image" class="hidden mb-6" alt="Uploaded preview" />
            </div>
            
            <div id="label-container" class="space-y-3 text-left mt-6 hidden"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "/my_model/";
        let model, webcam, maxPredictions;
        let currentMode = null;

        async function loadModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                
                document.getElementById('status-text').innerText = "Choose how you want to scan.";
                document.getElementById('controls').style.display = 'flex';
                
                switchMode('camera');
            } catch (error) {
                document.getElementById('status-text').innerText = "Error loading model. Check console for details.";
                console.error(error);
            }
        }

        async function switchMode(mode) {
            currentMode = mode;
            document.getElementById('label-container').innerHTML = ''; 
            document.getElementById('label-container').classList.add('hidden');
            
            const btnCam = document.getElementById('btn-camera');
            const btnUp = document.getElementById('btn-upload');

            if (mode === 'camera') {
                document.getElementById('camera-section').classList.remove('hidden');
                document.getElementById('upload-section').classList.add('hidden');
                
                btnCam.classList.replace('bg-transparent', 'bg-slate-900');
                btnCam.classList.replace('text-slate-900', 'text-white');
                btnUp.classList.replace('bg-slate-900', 'bg-transparent');
                btnUp.classList.replace('text-white', 'text-slate-900');

                await setupWebcam();
            } else {
                document.getElementById('camera-section').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
                
                btnUp.classList.replace('bg-transparent', 'bg-slate-900');
                btnUp.classList.replace('text-slate-900', 'text-white');
                btnCam.classList.replace('bg-slate-900', 'bg-transparent');
                btnCam.classList.replace('text-white', 'text-slate-900');

                stopWebcam();
            }
        }

        async function setupWebcam() {
            if (!webcam) {
                const flip = true; 
                webcam = new tmImage.Webcam(400, 400, flip);
            }
            await webcam.setup(); 
            await webcam.play();
            
            const container = document.getElementById("webcam-container");
            container.innerHTML = ''; 
            container.appendChild(webcam.canvas);
            
            window.requestAnimationFrame(updateWebcamFrame);
        }

        function updateWebcamFrame() {
            if (currentMode === 'camera' && webcam) {
                webcam.update();
                window.requestAnimationFrame(updateWebcamFrame);
            }
        }

        function stopWebcam() {
            if (webcam) {
                webcam.stop();
            }
        }

        async function captureAndPredict() {
            if (!webcam) return;
            currentMode = 'processing'; 
            
            document.getElementById('status-text').innerText = "Analyzing...";
            const prediction = await model.predict(webcam.canvas);
            displayResults(prediction);
            
            document.getElementById('status-text').innerText = "Result found! Tap 'Use Camera' to scan again.";
        }

        document.getElementById('image-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById('uploaded-image');
                    imgElement.src = e.target.result;
                    imgElement.classList.remove('hidden');
                    
                    imgElement.onload = async function() {
                        document.getElementById('status-text').innerText = "Analyzing...";
                        const prediction = await model.predict(imgElement);
                        displayResults(prediction);
                        document.getElementById('status-text').innerText = "Result found!";
                    }
                }
                reader.readAsDataURL(file);
            }
        });

        function resetScanner() {
            const container = document.getElementById("label-container");
            container.innerHTML = '';
            container.classList.add('hidden');

            if (currentMode === 'processing') {
                currentMode = 'camera';
                document.getElementById('status-text').innerText = "Point your camera at the food.";
                window.requestAnimationFrame(updateWebcamFrame); 
            } else {
                const imgElement = document.getElementById('uploaded-image');
                imgElement.src = "";
                imgElement.classList.add('hidden');
                
                document.getElementById('image-upload').value = "";
                document.getElementById('status-text').innerText = "Select an image to scan.";
            }
        }

        function displayResults(prediction) {
            const container = document.getElementById("label-container");
            container.innerHTML = '';
            container.classList.remove('hidden');

            prediction.sort((a, b) => b.probability - a.probability);
            const topResult = prediction[0];
            const probabilityScore = Math.round(topResult.probability * 100);

            const labelDiv = document.createElement("div");

            if (probabilityScore >= 30) {
                labelDiv.className = "bg-[#FFF0F0] border-2 border-[#E284C6] p-6 rounded-2xl text-center shadow-md transform transition-all";
                labelDiv.innerHTML = `
                    <div class="text-xs text-[#803875] uppercase tracking-widest font-bold mb-2">Best Match</div>
                    <div class="text-3xl font-extrabold text-slate-900 mb-3">${topResult.className}</div>
                    <div class="inline-block bg-white px-4 py-1 rounded-full text-sm font-bold text-[#9E4759] shadow-sm border border-[#E284C6]">
                        ${probabilityScore}% Match
                    </div>
                `;
            } else {
                labelDiv.className = "bg-slate-100 border-2 border-slate-300 p-6 rounded-2xl text-center shadow-md";
                labelDiv.innerHTML = `
                    <div class="text-xl font-bold text-slate-800 mb-2">Not quite sure...</div>
                    <div class="text-sm text-slate-600">The highest match was only ${probabilityScore}%. Try taking a clearer photo.</div>
                `;
            }

            container.appendChild(labelDiv);

            const resetBtn = document.createElement("button");
            resetBtn.onclick = resetScanner;
            resetBtn.className = "w-full mt-4 bg-slate-200 text-slate-700 font-bold py-3 rounded-xl hover:bg-slate-300 hover:text-slate-900 transition-colors shadow-sm";
            resetBtn.innerText = "Scan Another Item";
            container.appendChild(resetBtn);
        }

        window.onload = loadModel;
    </script>
</body>
</html>
